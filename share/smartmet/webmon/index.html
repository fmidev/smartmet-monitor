<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>smartmet-webmon</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header class="topbar">
  <span class="brand">smartmet-webmon</span>
  <select id="cluster-select" class="cluster-select hidden"
          title="active cluster"></select>
  <nav id="tabs" class="tabs"></nav>
  <span class="spacer"></span>
  <span id="status" class="status"></span>
  <span id="refresh-indicator" class="indicator"></span>
</header>

<!-- Cluster topology strip — pill per backend, color-hashed dot,
     alive/down state, hover tooltip lists handlers. Hidden in
     single-host mode. -->
<div id="cluster-topology" class="cluster-topology hidden"></div>

<main id="panel-host"></main>

<!-- URLs / Keys drill-down modal -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-head">
      <span id="modal-title" class="modal-title"></span>
      <button id="modal-close" class="modal-close" title="close (Esc)">×</button>
    </div>
    <div id="modal-body" class="modal-body"></div>
  </div>
</div>

<!-- Flame tooltip — follows the cursor over the rectangle view -->
<div id="flame-tooltip" class="flame-tooltip hidden"></div>

<script src="/static/chart.js"></script>
<script src="/static/flame.js"></script>
<script src="/static/ipflow.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
