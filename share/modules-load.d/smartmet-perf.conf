# Installed by smartmet-webmon. Required by bcc-tools
# (offcputime-bpfcc, biolatency-bpfcc, runqlat-bpfcc) which need
# kernel header symbols at runtime via the kheaders module. Module
# loading is privileged; smwebmon runs as the unprivileged
# smartmet-server user, so systemd-modules-load handles this once
# at boot.
kheaders
