# Shipped by smartmet-monitor. Vendor location (/usr/lib/sysctl.d/);
# a site-managed /etc/sysctl.d/99-smartmet-perf.conf overrides this on
# systemd-sysctl reload.
#
# Every setting is commented out by design. Installing the package
# does not silently relax kernel security on the host — that decision
# belongs to the host's hardening baseline owner. The line below is
# here so an operator who lands in this file from a panel install
# hint sees exactly what the smtop Flame panel needs and can copy it
# uncommented into the site-managed /etc/sysctl.d/ file (or uncomment
# it here, if that's how the site manages vendor drop-ins).
#
# kernel.perf_event_paranoid gates the perf_event_open(2) syscall.
# RHEL ships a default of 2. The smtop Flame panel needs 0 for the
# full set of modes to work for an unprivileged user — the on-CPU
# (cycles), page-fault, wakeup, block-I/O, and malloc modes all
# require <=0; only off-CPU, biolat, and runqlat already work at the
# distribution default. /usr/share/doc/smartmet-monitor/perf-event-paranoid.md
# has the per-feature compatibility table and the security trade-off
# (briefly: at 0, any user on the host can profile their own
# processes against kernel code, which leaks kernel-function
# locations — fine for a dedicated SmartMet host, less fine on a
# multi-tenant box).
#
#kernel.perf_event_paranoid = 0

# kernel.kptr_restrict gates whether /proc/kallsyms returns real
# kernel addresses or zeros for non-root readers. RHEL ships 1
# (hide unless CAP_SYSLOG); the smwebmon systemd unit grants
# CAP_SYSLOG so the daemon bypasses level 1 already. Lower to 0
# only on hardened hosts running kptr_restrict=2 (CAP_SYSLOG can't
# bypass that), or on hosts that want full kernel-frame names
# resolved in the on-CPU flame for non-daemon users running smtop.
# At 0 the host gives up KASLR pointer-hiding for everyone, so
# don't lower without considering the same-host security trade-off
# explained in /usr/share/doc/smartmet-monitor/perf-event-paranoid.md.
#
#kernel.kptr_restrict = 0
