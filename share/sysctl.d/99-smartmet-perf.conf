# Installed by smartmet-webmon. Required for the Flame panel and the
# Proc panel's perfstat numbers to work without granting the unit
# kernel capabilities.
#
# kernel.perf_event_paranoid gates who can use perf_event_open(2).
# RHEL default is 2 (denies CPU performance counters and most
# tracepoints to unprivileged users). 0 unlocks hardware perf
# counters and tracepoints for own-uid processes; raw and ftrace
# function tracepoints stay denied. Read
# /usr/share/doc/smartmet-monitor/perf-event-paranoid.md for the
# full per-feature compatibility table.
kernel.perf_event_paranoid = 0
