# smartmet-webmon — cluster definitions.
#
# Each [section] is one cluster. When this file has at least one
# section, smwebmon's dashboard shows a cluster selector dropdown
# at the top; selecting a cluster switches every panel to that
# cluster's data. When the file is empty (or missing), smwebmon
# runs in single-host mode (admin auto-probe of localhost
# :8080 / :8081, existing pre-26.4.30-12 behaviour).
#
# Required keys per cluster:
#
#   frontend-url        Base URL of the cluster's frontend. Used
#                       for /info?what=clusterinfo discovery —
#                       the HTML reports backend prefixes (c2,
#                       c3, ..., v1.q3) and which are alive.
#
#   admin-url-pattern   Per-backend admin URL template. The
#                       {prefix} placeholder is substituted with
#                       the short prefix from clusterinfo. NOT
#                       /info — /info doesn't expose cachestats /
#                       servicestats / activerequests / lastrequests
#                       (they're admin-only). smwebmon needs direct
#                       admin reachability to each backend, so this
#                       file should be edited on a host that has it.
#
# Optional:
#
#   webmon-url-pattern  Per-backend smwebmon URL template. When set,
#                       smwebmon probes each backend's own /api/health
#                       and, if reachable, fans out to its
#                       /api/proc/detail to power the cluster Proc
#                       panel (per-backend RSS / IO / threads /
#                       page-fault overlays). Requires smwebmon to be
#                       running and bound to a routable address on
#                       each backend. Backends without smwebmon are
#                       absent from the cluster Proc view but
#                       participate normally in every admin-driven
#                       panel.
#
#                       Security note: smwebmon binds to 127.0.0.1
#                       by default and is unauthenticated. To make
#                       it reachable from the frontend, set
#                       --bind=0.0.0.0:8765 (or your internal
#                       interface) on each backend, AND restrict
#                       access at firewall level. Backends should
#                       only accept smwebmon connections from the
#                       cluster's frontend(s).
#
#   log-glob            Local access-log glob, if smwebmon is
#                       running on a host that can read the
#                       cluster's access logs (e.g. on the frontend).
#                       Empty / omitted = no log-tail integration
#                       for this cluster.
#
#   admin-interval      How often (seconds) to poll each backend's
#                       admin endpoint. Default 2.0; raise to 5
#                       for big clusters where polling load matters.
#
#   discovery-interval  How often (seconds) to refetch clusterinfo
#                       from the frontend to pick up backends
#                       coming/going. Default 60.

# Example: the FMI back cluster (smartmet.fmi.fi). Uncomment and
# adjust on a real install.

#[back]
#frontend-url       = http://smartmet.fmi.fi
#admin-url-pattern  = http://{prefix}.back.smartmet.fmi.fi:8081/admin
#webmon-url-pattern = http://{prefix}.back.smartmet.fmi.fi:8765

#[opendata]
#frontend-url      = http://opendata.fmi.fi
#admin-url-pattern = http://{prefix}.opendata.fmi.fi:8081/admin

#[client-services]
#frontend-url      = http://cs.smartmet.fmi.fi
#admin-url-pattern = http://{prefix}.cs.smartmet.fmi.fi:8081/admin

#[internal]
#frontend-url      = http://internal.smartmet.fmi.fi
#admin-url-pattern = http://{prefix}.internal.smartmet.fmi.fi:8081/admin

#[high-priority]
#frontend-url      = http://hpc.smartmet.fmi.fi
#admin-url-pattern = http://{prefix}.hpc.smartmet.fmi.fi:8081/admin
